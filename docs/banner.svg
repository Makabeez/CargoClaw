<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="CargoClaw">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1f24"/><stop offset="1" stop-color="#0d1014"/>
    </linearGradient>
    <pattern id="hazard" width="24" height="24" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="12" height="24" fill="#f5a524"/><rect x="12" width="12" height="24" fill="#c2410c"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- moving road line -->
  <g stroke="#3a424b" stroke-width="3" stroke-dasharray="28 22">
    <line x1="0" y1="232" x2="1200" y2="232">
      <animate attributeName="stroke-dashoffset" from="0" to="-50" dur="0.7s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- trailer that fills with hazard freight (loading meters) -->
  <g transform="translate(120,150)">
    <rect x="0" y="0" width="420" height="64" rx="6" fill="none" stroke="#3a424b" stroke-width="2"/>
    <rect x="4" y="4" width="0" height="56" rx="4" fill="url(#hazard)">
      <animate attributeName="width" values="0;408;408" keyTimes="0;0.7;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- metre ticks -->
    <g stroke="#2c333b" stroke-width="1">
      <line x1="105" y1="0" x2="105" y2="64"/><line x1="210" y1="0" x2="210" y2="64"/><line x1="315" y1="0" x2="315" y2="64"/>
    </g>
  </g>

  <!-- USDC settlement coin -->
  <g transform="translate(600,182)">
    <circle r="18" fill="#2775ca">
      <animate attributeName="r" values="0;18;18" keyTimes="0;0.85;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff" opacity="0">$
      <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.85;1" dur="3s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="120" y="92" font-family="Arial Black, Arial" font-weight="900" font-size="62" fill="#f4f2ec" letter-spacing="-2">CargoClaw</text>
  <text x="124" y="128" font-family="Arial" font-size="19" fill="#f5a524" letter-spacing="1">Autonomous freight settlement on Circle Arc</text>
</svg>
